<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Microsoft Windows 7 booting logo animation">
    <meta name="keywords" content="@keyframes, Animation, Windows, CSS, HTML, Effects, booting, logo, 7, Microsoft">
    <meta name="author" content="Francis Annor Manu">
    <title>CSS Animation Effects</title>

    <style>

        @keyframes glow {
           
            /* 0%   { transform: translateX(0); opacity: 0; }
            50%  { transform: translateX(50px); opacity: 1; } 
            100% { transform: translateX(100px); opacity: 1; } */

            /* from {
                border: 2px solid white;
                opacity: 0.2;
            }
            to {
                border: 5px solid white;
                opacity: 1;
            } */

            0%{opacity: 0;}
            10%{opacity: 0.1;}
            20%{opacity: 0.2;}
            30%{opacity: 0.3;}
            40%{opacity: 0.4;}
            50%{opacity: 0.5;}
            60%{opacity: 0.6;}
            70%{opacity: 0.7;}
            80%{opacity: 0.8;}
            90%{opacity: 0.9;}
            100%{opacity: 1.0;}
        }

         
        @keyframes myDiv1 {
            0%{width: 0px; height: 0px; border-radius: 50%; background: white}
            10%{width: 10px; height: 10px; border-radius: 50%; background: white}
            20%{width: 10px; height: 10px; border-radius: 50%; background: white}
            30%{width: 10px; height: 10px; border-radius: 50%; background: white}
            40%{width: 10px; height: 10px; border-radius: 50%; background: white}
            50%{width: 10px; height: 10px; border-radius: 50%; background: white}
            60%{width: 10px; height: 10px; border-radius: 50%; background: white}
            70%{width: 10px; height: 10px; border-radius: 50%; background: white}
            80%{width: 10px; height: 10px; border-radius: 50%; background: white}
            90%{width: 10px; height: 10px; border-radius: 50%; background: white}
            100%{
                width: 100px; height: 100px; background: red; 
                /* box-shadow: 0px 0px 7px white; */
            }
        }

        @keyframes myDiv2 {
            0%{width: 0px; height: 0px; border-radius: 50%; background: white}
            10%{width: 10px; height: 10px; border-radius: 50%; background: white}
            20%{width: 10px; height: 10px; border-radius: 50%; background: white}
            30%{width: 10px; height: 10px; border-radius: 50%; background: white}
            40%{width: 10px; height: 10px; border-radius: 50%; background: white}
            50%{width: 10px; height: 10px; border-radius: 50%; background: white}
            60%{width: 10px; height: 10px; border-radius: 50%; background: white}
            70%{width: 10px; height: 10px; border-radius: 50%; background: white}
            80%{width: 10px; height: 10px; border-radius: 50%; background: white}
            90%{width: 10px; height: 10px; border-radius: 50%; background: white}
            100%{
                width: 100px; height: 100px; background: green; 
                /* box-shadow: 0px 0px 7px white; */
            }
        }

        @keyframes myDiv3 {
            0%{width: 0px; height: 0px; border-radius: 50%; background: white}
            10%{width: 10px; height: 10px; border-radius: 50%; background: white}
            20%{width: 10px; height: 10px; border-radius: 50%; background: white}
            30%{width: 10px; height: 10px; border-radius: 50%; background: white}
            40%{width: 10px; height: 10px; border-radius: 50%; background: white}
            50%{width: 10px; height: 10px; border-radius: 50%; background: white}
            60%{width: 10px; height: 10px; border-radius: 50%; background: white}
            70%{width: 10px; height: 10px; border-radius: 50%; background: white}
            80%{width: 10px; height: 10px; border-radius: 50%; background: white}
            90%{width: 10px; height: 10px; border-radius: 50%; background: white}
            100%{
                width: 100px; height: 100px; background: dodgerblue;
                 /* box-shadow: 0px 0px 7px white; */
            }
        }

        @keyframes myDiv4 {
           0%{width: 0px; height: 0px; border-radius: 50%; background: white}
            10%{width: 10px; height: 10px; border-radius: 50%; background: white}
            20%{width: 10px; height: 10px; border-radius: 50%; background: white}
            30%{width: 10px; height: 10px; border-radius: 50%; background: white}
            40%{width: 10px; height: 10px; border-radius: 50%; background: white}
            50%{width: 10px; height: 10px; border-radius: 50%; background: white}
            60%{width: 10px; height: 10px; border-radius: 50%; background: white}
            70%{width: 10px; height: 10px; border-radius: 50%; background: white}
            80%{width: 10px; height: 10px; border-radius: 50%; background: white}
            90%{width: 10px; height: 10px; border-radius: 50%; background: white}
            100%{
                width: 100px; height: 100px; background: gold; 
                /* box-shadow: 0px 0px 7px white; */
            }
        }

        @keyframes son {
            0%{width: 0px; height: 0px;}
            10%{width: 100px; height: 100px;}
            20%{width: 150px; height: 150px;}
            30%{width: 200px; height: 200px;}
            40%{width: 300px; height: 300px;}
            50%{width: 350px; height: 350px;}
            60%{width: 300px; height: 300px;}
            70%{width: 200px; height: 200px;}
            80%{width: 150px; height: 150px;}
            90%{width: 0px; height: 0px;}
            100%{width: 210px; height: 210px; transform: rotate(360deg);}
        }

        *{
            margin: 0px;
        }
        body{
            height: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
        }
        #div1, #div2, #div3, #div4{
            width: 100px;
            height: 100px;
            position: absolute;
            border-radius: 15px;
        }
        .parent{
            /* background: white; */
            animation: son 10s linear 1s 1 normal forwards;
        }

        #div1{
            top: 0;
            left: 0;
            animation: glow 1s ease 10s infinite alternate, myDiv1 10s ease 1s 1 normal both running;
        }

        #div2{
            top: 0;
            right: 0;
            animation: glow 1s ease 10s infinite alternate, myDiv2 10s ease 1s 1 normal both running;
        }

        #div3{
            left: 0;
            bottom: 0;
            animation: glow 1s ease 10s infinite alternate, myDiv3 10s ease 1s 1 normal both running;
        }


        #div4{
            right: 0;
            bottom: 0;
            animation: glow 1s ease 10s infinite alternate, myDiv4 10s ease 1s 1 normal both running;
        }

    </style>
</head>
<body>
    <!-- Microsoft Windows 7 booting logo animation -->
    <div class="parent">
        <div id="div1"></div>
        <div id="div2"></div>
        <div id="div3"></div>
        <div id="div4"></div>
    </div>
</body>
</html>
